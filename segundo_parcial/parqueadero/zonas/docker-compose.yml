version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: zonas_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zonas_db
      POSTGRES_INITDB_ARGS: '--encoding=UTF8'
    ports:
      - '5432:5432'
    volumes:
      - zonas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zonas_network
    restart: unless-stopped

volumes:
  zonas_postgres_data:
    driver: local

networks:
  zonas_network:
    driver: bridge
