spring:
  application:
    name: zonas
  datasource:
    url: jdbc:postgresql://localhost:5432/zonas_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  devtools:
    restart:
      enabled: true

server:
  port: 8080
